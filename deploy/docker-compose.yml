name: cassa-phase0

services:
  # Phase-0 essential: the INDI virtual site (simulator drivers on 7624).
  indi-sim:
    build:
      context: .
      dockerfile: indi-sim.Dockerfile
    image: cassa/indi-sim:latest
    ports:
      - "7624:7624"
    restart: unless-stopped

  # --- Infrastructure for later phases. Start with: docker compose --profile infra up -d
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    profiles: ["infra"]
    environment:
      POSTGRES_USER: cassa
      POSTGRES_PASSWORD: cassa
      POSTGRES_DB: cassa
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7
    profiles: ["infra"]
    ports: ["6379:6379"]

  nats:
    image: nats:2
    profiles: ["infra"]
    command: ["-js"]   # enable JetStream
    ports: ["4222:4222"]

  minio:
    image: minio/minio
    profiles: ["infra"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cassa
      MINIO_ROOT_PASSWORD: cassa-secret
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  # User-facing SFTP/FTP download gateway over the archive (read-only).
  #   docker compose -f deploy/docker-compose.yml --profile ftp up -d
  #   admin UI: http://localhost:8082  (admin / cassa-admin) -> create an SFTP user
  #   whose home maps to /srv/archive, then: sftp -P 2022 <user>@localhost
  sftpgo:
    image: drakkan/sftpgo:latest
    profiles: ["ftp"]
    ports:
      - "2022:2022"   # SFTP
      - "8082:8080"   # admin web UI
    environment:
      SFTPGO_DEFAULT_ADMIN_USERNAME: admin
      SFTPGO_DEFAULT_ADMIN_PASSWORD: cassa-admin
    volumes:
      - "../data/store:/srv/archive:ro"   # the CASSA local object store
      - "sftpgodata:/var/lib/sftpgo"

volumes:
  pgdata:
  miniodata:
  sftpgodata:
